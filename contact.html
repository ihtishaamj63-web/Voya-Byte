<!doctype html>
<html lang="en" data-theme="light" data-color="blue">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Ledger | Voya Bite</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/favicon-512x512.png"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
      /* Voya Bite theme variables - matches your main site */
      :root {
        --bg: #f8fafc;
        --bg-elev: #ffffff;
        --text: #0f172a;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }

      [data-theme="dark"] {
        --bg: #0f172a;
        --bg-elev: #1e293b;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --border: #334155;
        --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
      }

      [data-color="blue"] {
        --primary: #2c7ab5;
        --primary-hover: #236091;
      }
      [data-color="green"] {
        --primary: #219a52;
        --primary-hover: #1a7d42;
      }
      [data-color="purple"] {
        --primary: #7d3c98;
        --primary-hover: #632f7a;
      }
      [data-color="orange"] {
        --primary: #d35400;
        --primary-hover: #a84300;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 0;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        transition:
          background 0.3s,
          color 0.3s;
      }

      /* Match Voya Bite nav + theme controls */
      .theme-controls {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 12px;
        z-index: 100;
        align-items: center;
      }

      .theme-btn {
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        cursor: pointer;
        color: var(--text);
        box-shadow: var(--shadow);
      }

      .color-switcher {
        display: flex;
        gap: 6px;
        background: var(--bg-elev);
        padding: 6px;
        border-radius: 8px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .color-btn {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        border: 2px solid transparent;
        cursor: pointer;
      }
      .color-btn.active {
        border-color: var(--text);
      }

      .ledger-container {
        max-width: 1200px;
        margin: 100px auto 40px;
        padding: 0 20px;
      }

      .ledger-header {
        margin-bottom: 32px;
      }

      .ledger-header h1 {
        font-size: 2rem;
        margin: 0 0 8px;
      }

      .ledger-header p {
        color: var(--text-muted);
        margin: 0;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }

      .stat-card {
        background: var(--bg-elev);
        padding: 20px;
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .stat-label {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .stat-value {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--primary);
      }

      .btn {
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        background: var(--primary);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
      }

      .btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }

      .btn-danger {
        background: #dc2626;
      }
      .btn-danger:hover {
        background: #b91c1c;
      }

      form {
        background: var(--bg-elev);
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      input,
      select {
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        background: var(--bg);
        color: var(--text);
        flex: 1;
        min-width: 180px;
      }

      input:focus,
      select:focus {
        outline: 2px solid var(--primary);
        border-color: var(--primary);
      }

      .table-wrapper {
        background: var(--bg-elev);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 14px 16px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }

      th {
        background: var(--bg);
        font-weight: 600;
        font-size: 0.875rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .empty-state {
        background: var(--bg-elev);
        padding: 60px 40px;
        text-align: center;
        border-radius: 12px;
        color: var(--text-muted);
        border: 1px solid var(--border);
      }

      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 12px;
        opacity: 0.5;
      }

      .pass {
        color: var(--primary);
        font-weight: 700;
      }

      .source-tag {
        font-size: 11px;
        background: color-mix(in srgb, var(--primary) 15%, transparent);
        color: var(--primary);
        padding: 3px 8px;
        border-radius: 6px;
        margin-left: 6px;
        font-weight: 600;
      }

      #currentPeriod {
        margin: 16px 0;
        font-size: 13px;
        color: var(--text-muted);
      }

      @media (max-width: 768px) {
        .theme-controls {
          top: 12px;
          right: 12px;
        }
        .ledger-container {
          margin-top: 80px;
        }
        form {
          flex-direction: column;
        }
        input,
        select {
          min-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="theme-controls">
      <button
        id="theme-toggle"
        class="theme-btn"
        aria-label="Toggle dark mode"
        title="Toggle dark mode"
      >
        <span class="material-symbols-outlined">dark_mode</span>
      </button>
      <div class="color-switcher">
        <button
          class="color-btn active"
          data-color="blue"
          title="Blue theme"
          style="background: #2c7ab5"
        ></button>
        <button
          class="color-btn"
          data-color="green"
          title="Green theme"
          style="background: #219a52"
        ></button>
        <button
          class="color-btn"
          data-color="purple"
          title="Purple theme"
          style="background: #7d3c98"
        ></button>
        <button
          class="color-btn"
          data-color="orange"
          title="Orange theme"
          style="background: #d35400"
        ></button>
      </div>
    </div>

    <div class="ledger-container">
      <div class="ledger-header">
        <h1>Booking Ledger</h1>
        <p>All bookings from Voya Bite are recorded here automatically</p>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Total Bookings</div>
          <div class="stat-value" id="totalBookings">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Revenue</div>
          <div class="stat-value" id="totalRevenue">R0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Booking Value</div>
          <div class="stat-value" id="avgBooking">-</div>
        </div>
      </div>

      <form id="bookingForm">
        <input
          type="text"
          id="customerName"
          placeholder="Customer name"
          required
        />
        <select id="adventure" required>
          <option value="">Select adventure...</option>
          <option value="2200|Cape Town Hike">Cape Town Hike - R2,200</option>
          <option value="6500|Kruger Safari Day">
            Kruger Safari Day - R6,500
          </option>
          <option value="1600|Shark Cage Diving">
            Shark Cage Diving - R1,600
          </option>
          <option value="3700|Table Mountain Abseil">
            Table Mountain Abseil - R3,700
          </option>
          <option value="1750|Wine Tram Tour">Wine Tram Tour - R1,750</option>
        </select>
        <button type="submit" class="btn">Record Booking</button>
        <button type="button" class="btn" onclick="exportPDF()">
          Export PDF
        </button>
        <button type="button" class="btn btn-danger" onclick="resetAll()">
          Reset All
        </button>
      </form>

      <div id="currentPeriod"></div>
      <div id="bookingTable"></div>
    </div>

    <script>
      const STORAGE_KEY = "adventureBookingState";
      const INCOMING_BOOKING_KEY = "voyaBiteNewBooking";

      // Theme handling - matches Voya Bite
      const themeToggle = document.getElementById("theme-toggle");
      const colorBtns = document.querySelectorAll(".color-btn");
      const html = document.documentElement;

      // Load saved theme
      const savedTheme = localStorage.getItem("vb-theme") || "light";
      const savedColor = localStorage.getItem("vb-color") || "blue";
      html.setAttribute("data-theme", savedTheme);
      html.setAttribute("data-color", savedColor);

      themeToggle.querySelector("span").textContent =
        savedTheme === "dark" ? "light_mode" : "dark_mode";
      document
        .querySelector(`[data-color="${savedColor}"]`)
        .classList.add("active");

      themeToggle.addEventListener("click", () => {
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        localStorage.setItem("vb-theme", next);
        themeToggle.querySelector("span").textContent =
          next === "dark" ? "light_mode" : "dark_mode";
      });

      colorBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          const color = btn.getAttribute("data-color");
          html.setAttribute("data-color", color);
          localStorage.setItem("vb-color", color);
          colorBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
        });
      });

      // Booking logic
      function getCurrentPeriod() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
      }

      function loadBookings() {
        const saved = localStorage.getItem(STORAGE_KEY);
        const data = saved
          ? JSON.parse(saved)
          : { bookings: [], period: getCurrentPeriod(), archive: [] };

        const currentPeriod = getCurrentPeriod();
        if (data.period !== currentPeriod) {
          if (data.bookings.length > 0) {
            data.archive = data.archive || [];
            data.archive.push({
              period: data.period,
              bookings: data.bookings,
              totalRevenue: data.bookings.reduce((s, b) => s + b.price, 0),
            });
          }
          data.bookings = [];
          data.period = currentPeriod;
          saveBookings(data);
        }
        return data;
      }

      function saveBookings(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function addBooking(
        name,
        packageName,
        price,
        source = "Manual",
        extra = {},
      ) {
        const data = loadBookings();
        data.bookings.push({
          name,
          package: packageName,
          price: Number(price),
          source,
          timestamp: new Date().toISOString(),
          ...extra,
        });
        saveBookings(data);
        renderBookings();
        updateStats();
      }

      window.addEventListener("storage", (e) => {
        if (e.key === INCOMING_BOOKING_KEY && e.newValue) {
          const bookingData = JSON.parse(e.newValue);
          addBooking(
            bookingData.name,
            bookingData.package,
            bookingData.price,
            "Voya Bite",
            {
              email: bookingData.email,
              phone: bookingData.phone,
              startDate: bookingData.startDate,
              endDate: bookingData.endDate,
              adults: bookingData.adults,
              children: bookingData.children,
              location: bookingData.location,
            },
          );
          localStorage.removeItem(INCOMING_BOOKING_KEY);
        }
      });

      function checkIncomingBooking() {
        const incoming = localStorage.getItem(INCOMING_BOOKING_KEY);
        if (incoming) {
          const bookingData = JSON.parse(incoming);
          addBooking(
            bookingData.name,
            bookingData.package,
            bookingData.price,
            "Voya Bite",
            {
              email: bookingData.email,
              phone: bookingData.phone,
              startDate: bookingData.startDate,
              endDate: bookingData.endDate,
              adults: bookingData.adults,
              children: bookingData.children,
              location: bookingData.location,
            },
          );
          localStorage.removeItem(INCOMING_BOOKING_KEY);
        }
      }

      function resetAll() {
        if (
          !confirm("Reset ALL bookings for this month? This cannot be undone.")
        )
          return;
        const data = loadBookings();
        if (data.bookings.length > 0) {
          data.archive = data.archive || [];
          data.archive.push({
            period: data.period + " (manual reset)",
            bookings: data.bookings,
            totalRevenue: data.bookings.reduce((s, b) => s + b.price, 0),
            resetAt: new Date().toISOString(),
          });
        }
        data.bookings = [];
        saveBookings(data);
        renderBookings();
        updateStats();
      }

      function updateStats() {
        const data = loadBookings();
        const bookings = data.bookings || [];
        document.getElementById("totalBookings").textContent = bookings.length;
        const totalRevenue = bookings.reduce((sum, b) => sum + b.price, 0);
        document.getElementById("totalRevenue").textContent =
          "R" + totalRevenue.toFixed(2);
        const avgBooking = bookings.length
          ? (totalRevenue / bookings.length).toFixed(2)
          : "-";
        document.getElementById("avgBooking").textContent =
          avgBooking !== "-" ? "R" + avgBooking : "-";
        document.getElementById("currentPeriod").textContent =
          `Current period: ${data.period} | Auto-resets on 1st of each month`;
      }

      function renderBookings() {
        const data = loadBookings();
        const bookings = data.bookings || [];
        if (bookings.length === 0) {
          document.getElementById("bookingTable").innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🧳</div>
              <p>No bookings for ${data.period} yet.</p>
            </div>`;
          return;
        }
        let html =
          '<div class="table-wrapper"><table><thead><tr><th>Customer</th><th>Adventure Package</th><th>Price</th><th>Date</th><th>Details</th></tr></thead><tbody>';
        [...bookings].reverse().forEach((b) => {
          const date = new Date(b.timestamp).toLocaleDateString();
          const sourceTag = b.source
            ? `<span class="source-tag">${b.source}</span>`
            : "";
          const details = b.email
            ? `${b.email}<br>${b.phone || ""}<br>Adults: ${b.adults || 1}, Children: ${b.children || 0}`
            : "-";
          html += `<tr>
            <td>${b.name} ${sourceTag}</td>
            <td>${b.package}<br><small style="color:var(--text-muted)">${b.location || ""}</small></td>
            <td class="pass">R${b.price}</td>
            <td>${date}<br><small style="color:var(--text-muted)">${b.startDate || ""}</small></td>
            <td style="font-size:12px;color:var(--text-muted)">${details}</td>
          </tr>`;
        });
        html += "</tbody></table></div>";
        document.getElementById("bookingTable").innerHTML = html;
      }

      function exportPDF() {
        const data = loadBookings();
        const bookings = data.bookings || [];
        if (bookings.length === 0) {
          alert("No data to export");
          return;
        }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF("l", "mm", "a4");
        doc.setFontSize(20);
        doc.setTextColor(44, 122, 181);
        doc.text(`Voya Bite Bookings - ${data.period}`, 14, 20);
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Generated: ${new Date().toLocaleDateString()}`, 14, 28);
        const totalRevenue = bookings.reduce((s, b) => s + b.price, 0);
        doc.text(
          `Total Bookings: ${bookings.length} | Total Revenue: R${totalRevenue.toFixed(2)}`,
          14,
          35,
        );
        const rows = bookings.map((b) => [
          `${b.name} (${b.source || "Manual"})`,
          b.package,
          `R${b.price}`,
          new Date(b.timestamp).toLocaleDateString(),
          b.email || "-",
        ]);
        doc.autoTable({
          head: [["Customer", "Adventure", "Price", "Date", "Email"]],
          body: rows,
          startY: 42,
          theme: "grid",
          headStyles: {
            fillColor: [44, 122, 181],
            textColor: [255, 255, 255],
            fontStyle: "bold",
          },
        });
        doc.save(`voya_bite_bookings_${data.period}.pdf`);
      }

      document.getElementById("bookingForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const name = document.getElementById("customerName").value.trim();
        const [price, packageName] = document
          .getElementById("adventure")
          .value.split("|");
        if (!name || !packageName) return;
        addBooking(name, packageName, Number(price), "Manual");
        e.target.reset();
      });

      // Init
      checkIncomingBooking();
      renderBookings();
      updateStats();
    </script>
  </body>
</html>
